<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2a"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </linearGradient>
    <linearGradient id="plate-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f2fa"/>
      <stop offset="45%" stop-color="#e0e0ee"/>
      <stop offset="100%" stop-color="#b0b0c4"/>
    </linearGradient>
    <linearGradient id="collar-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcbccc"/>
      <stop offset="100%" stop-color="#84849a"/>
    </linearGradient>
    <linearGradient id="bar-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f96ff"/>
      <stop offset="100%" stop-color="#1a47cc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.32)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-150%" width="160%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="128" height="128" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="128" height="128" fill="url(#bg)"/>
    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.45)"/>
    </radialGradient>
    <rect width="128" height="128" fill="url(#vignette)"/>

    <!-- Left outer plate -->
    <rect x="13" y="36" width="17" height="56" rx="4" fill="url(#plate-v)"/>
    <!-- Left plate highlight strip -->
    <rect x="15" y="38" width="6" height="26" rx="2.5" fill="rgba(255,255,255,0.42)"/>

    <!-- Left collar -->
    <rect x="30" y="46" width="11" height="36" rx="2.5" fill="url(#collar-v)"/>
    <!-- Left collar highlight -->
    <rect x="31" y="47" width="4" height="16" rx="1.5" fill="rgba(255,255,255,0.18)"/>

    <!-- Bar (with blue glow) -->
    <rect x="41" y="59" width="46" height="10" rx="3" fill="url(#bar-v)" filter="url(#glow)"/>
    <!-- Bar top shine -->
    <rect x="42" y="60" width="44" height="4" rx="2" fill="url(#shine)"/>

    <!-- Right collar -->
    <rect x="87" y="46" width="11" height="36" rx="2.5" fill="url(#collar-v)"/>
    <!-- Right collar highlight -->
    <rect x="88" y="47" width="4" height="16" rx="1.5" fill="rgba(255,255,255,0.18)"/>

    <!-- Right outer plate -->
    <rect x="98" y="36" width="17" height="56" rx="4" fill="url(#plate-v)"/>
    <!-- Right plate highlight strip -->
    <rect x="100" y="38" width="6" height="26" rx="2.5" fill="rgba(255,255,255,0.42)"/>
  </g>
</svg>
